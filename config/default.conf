error_log /logs/error.log;
pid /logs/catsurf.pid;

server 
{
    listen 127.0.0.1:8080;
    server_name catsurf.com www.catsurf.com;
    root www;
    index index.html index.htm;
    error_page 404 /error_pages/404.html;
    client_max_body_size 10M;
    timeout 100;

    location /miao {
        index index2.html;
    }

    location /feed {
        upload_path uploads;
        index post.html;
    }

    location /idk {
        return 303 /feed;
    }

    location /cats {
        root www/images;
        autoindex off;
        allow_methods GET POST;
        upload_path uploads;
        cgi_extension .php;
        cgi_path /usr/bin/php-cgi;
        client_max_body_size 20M;
        return 301 /index.html;
    }

    location /upload {
        allow_methods POST DELETE;
        upload_path uploads;
    }
}

server
{
    listen 8081;
    server_name default;
    root www;
    index index.html;
}
